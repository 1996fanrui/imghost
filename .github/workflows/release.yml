name: release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - id: resolve
        run: |
          set -e
          ref="${GITHUB_REF_NAME}"
          version="${ref#v}"
          if [[ "${ref}" == *-alpha.* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

  go-binaries:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build filehub
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -e
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          out="filehub_${{ matrix.os }}_${{ matrix.arch }}${ext}"
          go build -ldflags "-X github.com/1996fanrui/filehub/cmd/filehub/cmd.version=${{ needs.resolve-version.outputs.version }}" -o "${out}" ./cmd/filehub
      - name: Build filehubd
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          set -e
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          out="filehubd_${{ matrix.os }}_${{ matrix.arch }}${ext}"
          go build -o "${out}" ./cmd/filehubd
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          suffix="${{ matrix.os }}_${{ matrix.arch }}${ext}"
          gh release upload "${{ github.event.release.tag_name }}" \
            "filehub_${suffix}" "filehubd_${suffix}" --clobber

  sha256sums:
    needs: go-binaries
    runs-on: ubuntu-latest
    steps:
      - name: Download binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern 'filehub*' --clobber
      - name: Compute sha256sums
        run: |
          set -e
          sha256sum filehub_* filehubd_* > SHA256SUMS
          cat SHA256SUMS
      - name: Upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          gh release upload "${{ github.event.release.tag_name }}" \
            SHA256SUMS --clobber
