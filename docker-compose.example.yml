# Example docker-compose for imghost.
# Copy to docker-compose.yml and adjust host paths/env before use.

services:
  imghost:
    image: imghost:latest
    build: .
    ports:
      - "34286:34286"
    environment:
      API_KEY: change-me
      DEFAULT_ACCESS: public
      # PORT: "34286"    # optional, defaults to 34286
      # DATA_DIR: /data  # optional, defaults to /data inside the container
    volumes:
      # Single-root layout: mount all objects under one host dir.
      - ./data:/data
      # Multi-mount layout: map separate host dirs to subpaths under /data.
      # - /host/photos:/data/photos
      # - /host/docs:/data/docs
      # bbolt permission DB (path is fixed to /var/lib/imghost/imghost.db).
      - ./imghost-db:/var/lib/imghost
    restart: unless-stopped
