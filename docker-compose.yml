services:
  imghost:
    image: imghost:latest
    build: .
    ports:
      - "34286:34286"
    environment:
      API_KEY: ${API_KEY:-change-me}
      DEFAULT_ACCESS: ${DEFAULT_ACCESS:-public}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ./data:/data
      # - /mnt/nas/photos:/data/photos
      # - /home/user/docs:/data/docs
      - ${XDG_STATE_HOME:-${HOME}/.local/state}/imghost:/var/lib/imghost
    restart: unless-stopped
